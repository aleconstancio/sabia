name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Container Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t spaceeye-backend:scan --build-arg BUILDKIT_INLINE_CACHE=1 .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: spaceeye-backend:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t spaceeye-frontend:scan --build-arg BUILDKIT_INLINE_CACHE=1 .

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: spaceeye-frontend:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
