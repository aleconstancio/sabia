name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          cache: true

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint check
        run: uv run ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/spaceeye-web

      - name: ESLint
        run: npm run lint
        working-directory: apps/spaceeye-web

      - name: Prettier check
        run: npm run format:check
        working-directory: apps/spaceeye-web

      - name: Svelte type check
        run: npm run check
        working-directory: apps/spaceeye-web

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          cache: true

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Mypy
        run: uv run mypy backend/ --ignore-missing-imports

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/spaceeye-web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/spaceeye-web

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: spaceeye_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a testpassword ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: redis-server --requirepass testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Initialize database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d spaceeye_test -c "CREATE EXTENSION IF NOT EXISTS postgis"
          for f in sql/001_init.sql sql/003_analyses.sql sql/004_profiles.sql sql/005_triggers.sql; do
            psql -h localhost -U postgres -d spaceeye_test -f "$f"
          done

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/spaceeye_test
          REDIS_URL: redis://:testpassword@localhost:6379/0
        run: uv run pytest backend/tests/ -v --tb=short --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/spaceeye-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/spaceeye-web

      - name: Run tests
        run: npm test -- --run
        working-directory: apps/spaceeye-web

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: pip-audit
        run: uv run pip-audit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: apps/spaceeye-web
        continue-on-error: true

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: spaceeye-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: spaceeye-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: npm ci
        working-directory: apps/spaceeye-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/spaceeye-web

      - name: Start services
        run: docker compose up -d
        env:
          POSTGRES_PASSWORD: postgres
          REDIS_PASSWORD: testpassword

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/spaceeye-web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/spaceeye-web/playwright-report/
          retention-days: 30
